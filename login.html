<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/388f753882.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="login.css">
    
    <title>Online store</title>
    <script>
        function sidebar_open(){
            document.getElementById("sizeMenu").style.width = "250px";
            document.getElementById("closeButton").style.display = "block";
        }
        function sidebar_close(){
            document.getElementById("sizeMenu").style.width = "0px";
            document.getElementById("closeButton").style.display = "none";
        }
    </script>

</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar_logo">
                <i class="fas fa-tshirt"></i>
                <a href="main.html">Online store</a>
            </div>

            <ul class="navbar_menu">
                <li><a href="">home</a></li>
                <li><a href="">about</a></li>
                <li><a href="">informaion</a></li>
                <li><a href="">Booking</a></li>
            </ul>

            <div class="navbar_icons">
                <form action="#">
                    <input type="text" placeholder = " search" name = "search" style = "padding-left:6px">
                </form>
                <a href=""><i class="fas fa-search"></i></a>
                <a href=""><i class="fas fa-shopping-cart"></i></a>
            </div>

            <div class="sidebar" id = "sizeMenu" style = "padding-top :20px">
                <a href="javascript:void(0)" id = "closeButton" class="closebtn" style = "display :none" onclick="sidebar_close()">&times;</a>
                <a href="login.html" style = "padding-top : 10px;">로그인</a>
                <a href="join.html">회원 가입</a>
                <br>
                <a href="#">Best</a>
                <a href="#">Mac</a>
                <a href="#">IPad</a>
                <a href="#">IPhone</a>
                <a href="#">Watch</a>
                <a href="#">Accessories</a>
                <a href="#">Q&A</a>
            </div>

            <span style = "font-size:30px;cursor:pointer; color : white" onclick="sidebar_open()">&#9776;</span>
        </nav>
    </header>
    <div class = "wrap">
        <div class="login">
            <h2>Log-in</h2>
            <div class="login_sns">
                <li><a href=""><i class="fab fa-facebook-square"></i></i></a></li>
                <li><a href=""><i class="fab fa-facebook-f"></i></a></li>
                <li><a href=""><i class="fab fa-twitter"></i></a></li>
            </div>

            <div class="login_id">
                <h4>Email</h4>
                <input type="text" class = "ID" id="" placeholder="Email">
            </div>

            <div class="login_pw">
                <h4>Password</h4>
                <input type="text" placeholder = "Password">
            </div>

            <div class="login_etc">
                <div class="checkbox">
                <input type="checkbox" name="" id=""> Remember Me?
                </div>
                <div class="forgot_pw">
                <a href="">Forgot Password?</a>
                </div>
            </div>

            <div class="submit">
                <input type="submit" value="submit">
            </div>
        </div>
    </div>
    
</body>
</html>
