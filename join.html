<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/388f753882.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="join.css">
    <title>Online store</title>
    <script>
        function sidebar_open(){
            document.getElementById("sizeMenu").style.width = "250px";
            document.getElementById("closeButton").style.display = "block";
        }
        function sidebar_close(){
            document.getElementById("sizeMenu").style.width = "0px";
            document.getElementById("closeButton").style.display = "none";
        }
    </script>
    
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar_logo">
                <i class="fas fa-tshirt"></i>
                <a href="main.html">Online store</a>
            </div>

            <ul class="navbar_menu">
                <li><a href="">home</a></li>
                <li><a href="">about</a></li>
                <li><a href="">informaion</a></li>
                <li><a href="">Booking</a></li>
            </ul>

            <div class="navbar_icons">
                <form action="#">
                    <input type="text" placeholder = " search" name = "search" style = "padding-left:6px">
                </form>
                <a href=""><i class="fas fa-search"></i></a>
                <a href=""><i class="fas fa-shopping-cart"></i></a>
            </div>

            <div class="sidebar" id = "sizeMenu" style = "padding-top :20px">
                <a href="javascript:void(0)" id = "closeButton" class="closebtn" style = "display :none" onclick="sidebar_close()">&times;</a>
                <a href="login.html" style = "padding-top : 10px;">로그인</a>
                <a href="">회원 가입</a>
                <br>
                <a href="#">Best</a>
                <a href="#">Mac</a>
                <a href="#">IPad</a>
                <a href="#">IPhone</a>
                <a href="#">Watch</a>
                <a href="#">Accessories</a>
                <a href="#">Q&A</a>
            </div>

            <span style = "font-size:30px;cursor:pointer; color : white" onclick="sidebar_open()">&#9776;</span>
        </nav>
    </header>

    <div class="wrap">
        <div class="join">
            <h2>Sign up with your email address</h2>
            <div class="join_name">
                <input type="text" placeholder="Name">
            </div>
            <div class="join_id">
                <input type="text" placeholder = "Email">
            </div>

            <div class="join_pw">
                <input type="text" size = "20" placeholder="Password">
            </div>

            <div class="join_phoneNumber">
                <input type="text" placeholder="PhoneNumber">
            </div>

            
            <div class="join_birth">
                <p>Date of birth:</p>
                <select name="Month" id="Month">
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
                <input type="text" id = "day" placeholder="Day">
                <input type="text" id = "year" placeholder="Year">

            </div>
            <div class="gender">
                <fieldset>
                    <input type="radio" id = "Male" value = "Male">
                    <label for="Male">Male</label>

                    <input type="radio" id = "Female" value = "Female">
                    <label for="Male">Female</label>
                </fieldset>
            </div>

            <div class="submit">
                <form action="">
                    <input type="submit" value="submit">
                </form>
                
            </div>
        </div>
    </div>
</body>
</html>
